<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flip Clock</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <main class="stage">
    <div class="clock" id="clock">

      <div class="group" data-group="hours">
        <div class="unit" data-unit="h1"></div>
        <div class="unit" data-unit="h2"></div>
      </div>

      <div class="colon" aria-hidden="true"><span></span><span></span></div>

      <div class="group" data-group="minutes">
        <div class="unit" data-unit="m1"></div>
        <div class="unit" data-unit="m2"></div>
      </div>

      <div class="colon" aria-hidden="true"><span></span><span></span></div>

      <div class="group" data-group="seconds">
        <div class="unit" data-unit="s1"></div>
        <div class="unit" data-unit="s2"></div>
      </div>

    </div>

    <div class="meta-row">
      <button class="mode-toggle" id="modeToggle" type="button" aria-label="Toggle 12/24 hour format">24H</button>
      <div class="date" id="dateLabel"></div>
      <div class="ampm" id="ampmLabel"></div>
    </div>
  </main>

  <script src="script.js"></script>
</body>
</html>
